name: MusicSync
options:
  bundleIdPrefix: com.chrisaperez
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"            # Swift 5 language mode = relaxed concurrency checks
    SWIFT_STRICT_CONCURRENCY: minimal
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"     # iPhone
targets:
  MusicSync:
    type: application
    platform: iOS
    sources:
      - MusicSync
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chrisaperez.musicsync
        GENERATE_INFOPLIST_FILE: NO
    info:
      path: MusicSync/Info.plist
      properties:
        CFBundleDisplayName: Music Sync
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIBackgroundModes: [audio]
        NSLocalNetworkUsageDescription: "Find and stream music from the Music Player app running on your Mac over your local wifi network."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
