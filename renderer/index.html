<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' file:; img-src 'self' file: media: data: blob:; media-src media: blob: file:; style-src 'self' 'unsafe-inline' file:; script-src 'self' file:; font-src 'self' file:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Player</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-theme="dark">
  <div id="titlebar"></div>

  <div id="app">
    <aside id="sidebar">
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 24 24" aria-hidden="true">
          <!-- Radiating sound waves -->
          <path class="accent-stroke" d="M 12 18 A 2 2 0 0 0 12 14 A 2 2 0 0 0 12 18" fill="none" stroke-width="1.2" stroke-opacity="0.8"/>
          <path class="accent-stroke" d="M 9 16 A 5 5 0 0 1 15 16" fill="none" stroke-width="1.2" stroke-opacity="0.6"/>
          <path class="accent-stroke" d="M 6 16 A 8 8 0 0 1 18 16" fill="none" stroke-width="1.2" stroke-opacity="0.4"/>
          <path class="accent-stroke" d="M 3 16 A 11 11 0 0 1 21 16" fill="none" stroke-width="1.2" stroke-opacity="0.2"/>
          
          <!-- Architectural silhouette of conservatory -->
          <path class="accent-stroke" d="M 4 12 C 4 6 8 3 12 3 C 16 3 20 6 20 12" fill="none" stroke-width="1.5" stroke-linecap="round"/>
          <path class="accent-stroke" d="M 4 12 L 4 21 M 20 12 L 20 21 M 2 21 L 22 21" fill="none" stroke-width="1.5" stroke-linecap="round"/>
          <circle class="accent-fill" cx="12" cy="3" r="1.5"/>
        </svg>
        Conservatory
      </div>

      <nav class="nav">
        <button class="nav-item active" data-view="songs">Songs</button>
        <button class="nav-item" data-view="albums">Albums</button>
        <button class="nav-item" data-view="artists">Artists</button>
        <button class="nav-item" data-view="recent">Recently Added</button>
        <button class="nav-item" data-view="recaps">Recaps</button>
      </nav>

      <div class="pl-header madefor-header">Made For You</div>
      <button class="nav-item onrepeat" id="onrepeat-item" data-view="onrepeat">
        On Repeat
        <span class="pl-count" id="onrepeat-count"></span>
      </button>
      <button class="nav-item onrepeat" id="discover-item" data-view="discover">
        Discover Mix
        <span class="pl-count" id="discover-count"></span>
      </button>

      <div class="pl-header">
        <span>Playlists</span>
        <button id="new-playlist" title="New playlist">＋</button>
      </div>
      <ul id="playlist-list" class="playlist-list"></ul>

      <div class="sidebar-footer">
        <button id="spot-import" class="rescan-btn">Import from Spotify</button>
        <button id="phone-sync" class="rescan-btn">Phone Sync</button>
        <button id="rescan" class="rescan-btn">Rescan library</button>
        <div class="lib-path" id="lib-path" title="Click to change folder"></div>
      </div>
    </aside>

    <main id="main">
      <header id="topbar">
        <div class="topbar-left">
          <div class="nav-history">
            <button id="nav-back" class="histbtn" title="Back (⌘[)" disabled><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
            <button id="nav-fwd" class="histbtn" title="Forward (⌘])" disabled><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
          </div>
          <div class="search">
            <span class="search-ico">⌕</span>
            <input id="search" type="search" placeholder="Search songs, artists, or albums" autocomplete="off" />
          </div>
        </div>
        <div class="topbar-tools">
          <div class="accent-wrap">
            <button id="accent-btn" class="accent-btn" title="Accent color"><span class="accent-dot"></span></button>
            <div id="accent-pop" class="accent-pop hidden"></div>
          </div>
          <div class="theme-seg" id="theme-seg" role="group" aria-label="Theme">
            <button data-theme-choice="light" title="Light">☀</button>
            <button data-theme-choice="system" title="Match system">◐</button>
            <button data-theme-choice="dark" title="Dark">☾</button>
          </div>
        </div>
      </header>

      <section id="content" class="content"></section>
    </main>
  </div>

  <footer id="player-bar">
    <div class="np-left">
      <img id="np-art" class="np-art" alt="" />
      <div class="np-meta">
        <div id="np-title" class="np-title">—</div>
        <div id="np-artist" class="np-artist"></div>
      </div>
    </div>

    <div class="np-center">
      <div class="transport">
        <button id="btn-shuffle" class="t-btn" title="Shuffle">⤮</button>
        <button id="btn-prev" class="t-btn" title="Previous">⏮</button>
        <button id="btn-play" class="t-btn play" title="Play/Pause">▶</button>
        <button id="btn-next" class="t-btn" title="Next">⏭</button>
        <button id="btn-repeat" class="t-btn" title="Repeat">⟲</button>
      </div>
      <div class="seek">
        <span id="cur-time" class="time">0:00</span>
        <input id="seek" class="seek-bar" type="range" min="0" max="1000" value="0" step="1" />
        <span id="dur-time" class="time">0:00</span>
      </div>
    </div>

    <div class="np-right">
      <button id="btn-queue" class="t-btn queue-btn" title="Queue">☰</button>
      <span class="vol-ico"><svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><path fill="currentColor" d="M4 9v6h4l5 4V5L8 9H4z"/><path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" d="M16.5 8.8a4.5 4.5 0 0 1 0 6.4M19 6.5a8 8 0 0 1 0 11"/></svg></span>
      <input id="volume" class="vol-bar" type="range" min="0" max="1" value="1" step="0.01" />
    </div>
  </footer>

  <aside id="queue-panel" class="queue-panel hidden"></aside>

  <audio id="audio"></audio>
  <div id="context-menu" class="context-menu hidden"></div>
  <div id="toast" class="toast hidden"></div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h2 id="modal-title">New Playlist</h2>
      <div id="modal-photo-row" class="modal-photo-row hidden">
        <button id="modal-photo" class="modal-photo" type="button" title="Change cover photo"></button>
        <div class="mp-hint">Cover photo<small>Click the photo to change or remove it</small></div>
      </div>
      <label>Name</label>
      <input id="modal-name" type="text" maxlength="120" placeholder="My playlist" autocomplete="off" />
      <label>Description <span id="modal-desc-count">0/500</span></label>
      <textarea id="modal-desc" maxlength="500" rows="4" placeholder="Add an optional description…"></textarea>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn">Cancel</button>
        <button id="modal-save" class="btn primary">Create</button>
      </div>
    </div>
  </div>

  <script src="player.js"></script>
  <script src="app.js"></script>
</body>
</html>
